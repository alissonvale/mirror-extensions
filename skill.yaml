id: finances
name: Finances
category: extension
kind: command-skill
summary: Personal and business finance tracking — accounts, transactions, snapshots, recurring bills, burn rate and runway.
table_prefix: ext_finances_

entrypoint:
  module: extension

runtimes:
  pi:
    command_name: ext-finances
    skill_file: SKILL.md
  claude:
    command_name: ext:finances
    skill_file: SKILL.md

mirror_context_providers:
  - id: financial_summary
    description: "Live financial summary: balances by liquidity bucket, monthly cash flow, monthly burn, runway."
    suggested_personas: [tesoureira, treasurer, cfo, founder]

requires:
  extension_api: ">=1.0,<2.0"
